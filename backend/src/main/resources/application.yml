spring:
  application:
    name: upt-pontaje

  profiles:
    active: prod   # match the docker-compose env

  datasource:
    url: jdbc:postgresql://postgres:5432/pontaje
    username: pontaje_user
    password: pontaje_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:mySecretKeyForDevelopmentOnlyPleaseChangeInProduction123456789}
  expiration: 86400000

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}

  pontaj:
    deadline-day: 25
    reminder-days-before: 3

  documents:
    storage-path: ${DOCUMENTS_PATH:./documents}

  scheduler:
    enabled: ${SCHEDULER_ENABLED:true}

logging:
  level:
    ro.upt.pontaje: DEBUG
    org.springframework.security: DEBUG
